<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dang nhap - Luxurious Fashion</title>
  <link rel="stylesheet" href="../../css/bien.css">
  <link rel="stylesheet" href="../../css/chung.css">
  <link rel="stylesheet" href="../../css/tien_ich.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <link rel="stylesheet" href="../../css/thanh_phan/header.css">
  <link rel="stylesheet" href="../../css/thanh_phan/footer.css">
  <link rel="stylesheet" href="../../css/trang/dang_nhap.css">
</head>
<body>
  <div id="header"></div>
  <main>
    <section class="auth-page">
      <div class="auth-card">
        <div class="auth-heading">
          <span class="tagline">Tài khoản</span>
          <h1>Đăng nhập</h1>
          <p>Chọn loại tài khoản để tiếp tục.</p>
        </div>

        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="customer">Khách hàng</button>
          <button class="tab-btn" data-tab="admin">Quản trị viên</button>
        </div>

        <!-- Customer Login -->
        <form id="form-dang-nhap" class="auth-form" data-role="customer">
          <div class="form-group">
            <label for="email-customer">Email</label>
            <input type="email" id="email-customer" name="email" placeholder="email@domain.com" required>
          </div>
          <div class="form-group">
            <label for="password-customer">Mật khẩu</label>
            <div style="position: relative;">
              <input type="password" id="password-customer" name="password" placeholder="Nhập mật khẩu" required>
              <a href="../quen_mat_khau/quen_mat_khau.html" style="display: block; text-align: right; font-size: 0.875rem; margin-top: 0.25rem; color: #666;">Quên mật khẩu?</a>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Đăng nhập</button>
        </form>

        <!-- Admin Login -->
        <form id="form-dang-nhap-admin" class="auth-form" data-role="admin" style="display: none;">
          <div class="form-group">
            <label for="email-admin">Email</label>
            <input type="email" id="email-admin" name="email" placeholder="admin@domain.com" required>
          </div>
          <div class="form-group">
            <label for="password-admin">Mật khẩu</label>
            <input type="password" id="password-admin" name="password" placeholder="Nhập mật khẩu" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Đăng nhập</button>
        </form>

        <div class="auth-footer">
          <p>Chưa có tài khoản? <a href="../dang_ky/dang_ky.html">Đăng ký ngay</a></p>
        </div>
      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script src="../../js/tai_component.js"></script>
  <script src="../../js/chung.js"></script>
  <script src="../../js/gio_hang.js"></script>
  <script src="../../js/yeu_thich.js"></script>
  <script src="../../js/thanh_phan/header.js"></script>
  <script src="../../js/dang_nhap.js"></script>
</body>
</html>
