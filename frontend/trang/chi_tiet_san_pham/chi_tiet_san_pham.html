<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết — LUXURIOUS STORE</title>
  <link rel="stylesheet" href="../../css/bien.css">
  <link rel="stylesheet" href="../../css/chung.css">
  <link rel="stylesheet" href="../../css/tien_ich.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <link rel="stylesheet" href="../../css/thanh_phan/header.css">
  <link rel="stylesheet" href="../../css/thanh_phan/footer.css">
  <link rel="stylesheet" href="../../css/trang/chi_tiet_san_pham.css">
</head>
<body>
  <div id="header"></div>
  <main class="product-detail-page">
    <div class="product-detail container">
      <div class="product-detail__gallery">
        <div class="product-detail__main">
          <img id="hinh-san-pham" src="" alt="">
        </div>
        <div class="product-detail__thumbs" id="gallery-thumbs"></div>
      </div>
      <div class="product-detail__info">
        <p id="ten-danh-muc" class="product-detail__category"></p>
        <h1 id="ten-san-pham"></h1>
        <p id="gia-san-pham" class="product-detail__price"></p>
        <div class="product-detail__colors">
          <span class="label">Màu sắc</span>
          <div id="color-options" class="color-options"></div>
        </div>
        <p id="mo-ta-san-pham" class="product-detail__desc"></p>
        <div class="product-detail__actions">
          <button id="btn-them-gio" class="btn btn-primary">Thêm vào giỏ hàng</button>
          <button id="btn-yeu-thich" class="btn btn-ghost">Yêu thích</button>
        </div>
        <ul class="product-detail__meta">
          <li>Giao hàng toàn quốc — 3–5 ngày làm việc</li>
          <li>Đổi trả trong 7 ngày (nguyên tem)</li>
          <li>Tư vấn stylist: <a href="../lien_he/lien_he.html">Liên hệ</a></li>
        </ul>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script src="../../js/tai_component.js"></script>
  <script src="../../js/chung.js"></script>
  <script src="../../js/gio_hang.js"></script>
  <script src="../../js/yeu_thich.js"></script>
  <script src="../../js/thanh_phan/header.js"></script>
  <script src="../../js/trang/chi_tiet_san_pham.js"></script>
</body>
</html>
