<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác thực Email - Luxurious Fashion</title>
  <link rel="stylesheet" href="../../css/bien.css">
  <link rel="stylesheet" href="../../css/chung.css">
  <link rel="stylesheet" href="../../css/tien_ich.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <link rel="stylesheet" href="../../css/thanh_phan/header.css">
  <link rel="stylesheet" href="../../css/thanh_phan/footer.css">
  <link rel="stylesheet" href="../../css/trang/dang_ky.css">
  <style>
    .verification-card {
      max-width: 500px;
      margin: 60px auto;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .verification-icon {
      font-size: 48px;
      text-align: center;
      margin-bottom: 20px;
    }

    .verification-card h1 {
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 10px;
      font-family: var(--font-chinh);
      letter-spacing: 0.1em;
    }

    .verification-card p {
      text-align: center;
      color: var(--mau-chu-nhat);
      margin-bottom: 30px;
    }

    .code-input-group {
      margin-bottom: 20px;
    }

    .code-input-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .code-input-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--mau-vien);
      border-radius: 6px;
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
    }

    .code-input-group input:focus {
      outline: none;
      border-color: var(--mau-chinh);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .verification-buttons {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    .verification-buttons button {
      flex: 1;
    }

    .status-message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }

    .status-message.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #4caf50;
      display: block;
    }

    .status-message.error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #f44336;
      display: block;
    }

    .status-message.loading {
      background: #e3f2fd;
      color: #1565c0;
      border: 1px solid #2196f3;
      display: block;
    }

    .countdown {
      text-align: center;
      color: var(--mau-chu-nhat);
      margin-top: 20px;
      font-size: 0.9rem;
    }

    .help-text {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 6px;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="header"></div>
  <main class="container">
    <div class="verification-card">
      <div class="verification-icon">✉️</div>
      <h1>Xác thực Email</h1>
      <p>Hãy nhập mã xác thực được gửi đến email của bạn</p>

      <div class="status-message" id="status-message"></div>

      <form id="verification-form">
        <div class="code-input-group">
          <label for="verification-code">Mã xác thực (6 ký tự)</label>
          <input 
            type="text" 
            id="verification-code" 
            name="code" 
            placeholder="VD: ABC123"
            maxlength="6"
            pattern="[A-Z0-9]{6}"
            required
            autocomplete="off"
          >
        </div>

        <div class="verification-buttons">
          <button type="submit" class="btn btn-primary btn-full">Xác thực</button>
          <button type="button" class="btn btn-ghost btn-full" id="back-btn">Quay lại</button>
        </div>
      </form>

      <div class="help-text">
        <strong>💡 Mẹo:</strong>
        <ul style="margin: 10px 0 0 0; padding-left: 20px;">
          <li>Kiểm tra thư mục "Spam" hoặc "Thư rác" nếu không nhận được email</li>
          <li>Mã xác thực có hiệu lực trong 24 giờ</li>
          <li>Nếu không nhận được email, hãy <a href="../dang_ky/dang_ky.html">đăng ký lại</a></li>
        </ul>
      </div>

      <div class="countdown" id="countdown" style="display: none;"></div>
    </div>
  </main>
  <div id="footer"></div>

  <script src="../../js/tai_component.js"></script>
  <script src="../../js/chung.js"></script>
  <script>
    const form = document.getElementById('verification-form');
    const codeInput = document.getElementById('verification-code');
    const statusMsg = document.getElementById('status-message');
    const backBtn = document.getElementById('back-btn');
    const countdownEl = document.getElementById('countdown');

    // Get code from URL parameter if exists
    function getCodeFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('code') || '';
    }

    // Auto-fill code if from URL
    const urlCode = getCodeFromUrl();
    if (urlCode) {
      codeInput.value = urlCode.toUpperCase();
      // Auto-submit if valid
      if (/^[A-Z0-9]{6}$/.test(urlCode)) {
        setTimeout(() => form.dispatchEvent(new Event('submit')), 500);
      }
    }

    // Format input to uppercase
    codeInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });

    // Handle form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = codeInput.value.trim();

      if (!/^[A-Z0-9]{6}$/.test(code)) {
        showStatus('Mã xác thực phải là 6 ký tự (chữ hoặc số)', 'error');
        return;
      }

      showStatus('Đang xác thực...', 'loading');
      codeInput.disabled = true;
      form.querySelector('button[type="submit"]').disabled = true;

      try {
        const result = await Chung.goiApi('../../../backend/api/xac_thuc_email.php', {
          method: 'POST',
          body: JSON.stringify({ code })
        });

        if (result.success) {
          showStatus('✓ Xác thực thành công! Đang chuyển hướng...', 'success');
          setTimeout(() => {
            window.location.href = '../dang_nhap/dang_nhap.html';
          }, 2000);
        } else {
          showStatus('✗ ' + (result.message || 'Xác thực thất bại'), 'error');
          codeInput.disabled = false;
          form.querySelector('button[type="submit"]').disabled = false;
          codeInput.focus();
        }
      } catch (err) {
        showStatus('✗ Lỗi kết nối: ' + err.message, 'error');
        codeInput.disabled = false;
        form.querySelector('button[type="submit"]').disabled = false;
      }
    });

    // Back button
    backBtn.addEventListener('click', () => {
      window.location.href = '../dang_ky/dang_ky.html';
    });

    function showStatus(message, type) {
      statusMsg.textContent = message;
      statusMsg.className = `status-message ${type}`;
    }

    // Focus input on load
    window.addEventListener('load', () => {
      if (!urlCode) {
        codeInput.focus();
      }
    });
  </script>
</body>
</html>
