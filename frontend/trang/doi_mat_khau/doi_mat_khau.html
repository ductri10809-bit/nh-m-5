<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đổi mật khẩu - Luxurious Fashion</title>
  <link rel="stylesheet" href="../../css/bien.css">
  <link rel="stylesheet" href="../../css/chung.css">
  <link rel="stylesheet" href="../../css/tien_ich.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <link rel="stylesheet" href="../../css/thanh_phan/header.css">
  <link rel="stylesheet" href="../../css/thanh_phan/footer.css">
  <link rel="stylesheet" href="../../css/trang/dang_nhap.css">
</head>
<body>
  <div id="header"></div>
  <main>
    <section class="auth-page">
      <div class="auth-card">
        <div class="auth-heading">
          <span class="tagline">Bảo mật tài khoản</span>
          <h1>Đổi mật khẩu</h1>
          <p>Thay đổi mật khẩu định kỳ để bảo vệ tài khoản của bạn.</p>
        </div>

        <form id="form-doi-mk" class="auth-form">
          <div class="form-group">
            <label for="old_password">Mật khẩu hiện tại</label>
            <input type="password" id="old_password" name="old_password" placeholder="Mật khẩu hiện tại" required>
          </div>
          <div class="form-group">
            <label for="new_password">Mật khẩu mới</label>
            <input type="password" id="new_password" name="new_password" placeholder="Mật khẩu mới" required>
          </div>
          <div class="form-group">
            <label for="confirm_password">Xác nhận mật khẩu mới</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu mới" required>
          </div>

          <button type="submit" class="btn btn-primary btn-full">Cập nhật mật khẩu</button>
        </form>

      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script src="../../js/tai_component.js"></script>
  <script src="../../js/chung.js"></script>
  <script src="../../js/gio_hang.js"></script>
  <script src="../../js/yeu_thich.js"></script>
  <script src="../../js/thanh_phan/header.js"></script>
  <script src="../../js/doi_mat_khau.js"></script>
</body>
</html>
