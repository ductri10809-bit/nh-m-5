<form id="form-lien-he" class="form-lien-he">
  <div class="form-group">
    <label for="ho_ten">Họ tên</label>
    <input type="text" id="ho_ten" name="ho_ten" required>
  </div>
  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>
  </div>
  <div class="form-group">
    <label for="noi_dung">Nội dung</label>
    <textarea id="noi_dung" name="noi_dung" rows="5" required></textarea>
  </div>
  <button type="submit" class="btn btn-primary">Gửi liên hệ</button>
  <div id="successMessage" style="display: none; margin-top: 15px; padding: 15px; background: #d4edda; border: 1px solid #c3e6cb; color: #155724; border-radius: 4px;">
    ✓ Gửi liên hệ thành công! Mã theo dõi: <strong id="trackingId"></strong>
    <br><small>Bạn có thể xem trạng thái trong trang cá nhân</small>
  </div>
</form>
