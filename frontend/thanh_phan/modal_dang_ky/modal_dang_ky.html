<div id="modal-dang-ky" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" aria-label="Dong">&times;</button>
    <h2>Dang ky</h2>
    <form id="form-modal-dang-ky">
      <div class="form-group">
        <label for="modal-ho-ten">Ho ten</label>
        <input type="text" id="modal-ho-ten" name="ho_ten" required>
      </div>
      <div class="form-group">
        <label for="modal-reg-email">Email</label>
        <input type="email" id="modal-reg-email" name="email" required>
      </div>
      <div class="form-group">
        <label for="modal-reg-password">Mat khau</label>
        <input type="password" id="modal-reg-password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary">Dang ky</button>
    </form>
  </div>
</div>
