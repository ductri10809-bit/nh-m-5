<div id="modal-dang-nhap" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" aria-label="Dong">&times;</button>
    <h2>Dang nhap</h2>
    <form id="form-modal-dang-nhap">
      <div class="form-group">
        <label for="modal-email">Email</label>
        <input type="email" id="modal-email" name="email" required>
      </div>
      <div class="form-group">
        <label for="modal-password">Mat khau</label>
        <input type="password" id="modal-password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary">Dang nhap</button>
    </form>
  </div>
</div>
